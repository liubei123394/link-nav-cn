<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>随机选人</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh; display: flex; justify-content: center; align-items: center;
  }
  .container {
    background: #fff; border-radius: 16px; padding: 40px; width: 90%; max-width: 560px;
    box-shadow: 0 20px 60px rgba(0,0,0,.2); text-align: center;
  }
  h1 { font-size: 28px; margin-bottom: 24px; color: #333; }
  textarea {
    width: 100%; height: 120px; border: 2px solid #e0e0e0; border-radius: 10px;
    padding: 12px; font-size: 16px; resize: none; outline: none;
    transition: border-color .3s;
  }
  textarea:focus { border-color: #667eea; }
  .hint { font-size: 13px; color: #999; margin: 8px 0 16px; text-align: left; }
  .pick-row {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    margin-bottom: 10px;
  }
  .pick-row label { font-size: 15px; color: #555; font-weight: 500; }
  .pick-row input[type=number] {
    width: 64px; padding: 8px; font-size: 16px; border: 2px solid #e0e0e0;
    border-radius: 8px; text-align: center; outline: none;
    transition: border-color .3s;
  }
  .pick-row input:focus { border-color: #667eea; }
  .display-area {
    min-height: 80px; margin: 24px 0; display: flex; align-items: center;
    justify-content: center; flex-wrap: wrap; gap: 12px;
  }
  .name-tag {
    font-size: 32px; font-weight: 700; color: #764ba2; padding: 8px 18px;
    border-radius: 12px; background: #f5f3ff; display: inline-block;
    will-change: transform;
  }
  .name-tag.rolling { animation: pulse .15s infinite alternate; }
  .name-tag.result {
    animation: pop .5s cubic-bezier(.17,.89,.32,1.49);
    color: #667eea; background: #eef0ff;
    animation-fill-mode: forwards;
  }
  @keyframes pulse { to { transform: scale(1.05); } }
  @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .placeholder { font-size: 48px; color: #ccc; font-weight: 700; }
  .btn-row { display: flex; justify-content: center; gap: 12px; min-height: 52px; align-items: center; }
  button {
    padding: 14px 48px; font-size: 18px; border: none; border-radius: 50px;
    cursor: pointer; transition: all .3s; font-weight: 600;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  }
  .btn-start { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(118,75,162,.4); }
  .btn-stop {
    background: linear-gradient(135deg, #f5576c, #ff6a88); color: #fff;
    min-width: 140px; font-size: 22px; padding: 16px 56px;
  }
  .btn-stop:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,87,108,.4); }
  .btn-stop:active { transform: scale(0.96); }
  .history { margin-top: 28px; text-align: left; }
  .history h3 { font-size: 15px; color: #666; margin-bottom: 8px; }
  .history-round {
    margin-bottom: 10px; padding: 10px 14px; background: #fafafa; border-radius: 10px;
  }
  .history-round .round-label { font-size: 12px; color: #aaa; margin-bottom: 6px; }
  .history-round .round-names { display: flex; flex-wrap: wrap; gap: 6px; }
  .history-round .round-names span {
    background: #f0eef5; color: #764ba2; padding: 4px 14px; border-radius: 20px;
    font-size: 14px; font-weight: 500;
  }
</style>
</head>
<body>
<div class="container">
  <h1>🎲 随机选人</h1>
  <textarea id="names" placeholder="输入候选人名单，每行一个名字…&#10;张三&#10;李四&#10;王五&#10;赵六&#10;孙七"></textarea>
  <p class="hint">每行一个名字，也支持逗号或空格分隔</p>
  <div class="pick-row">
    <label for="pickCount">一次选</label>
    <input type="number" id="pickCount" value="1" min="1" max="99">
    <label>人</label>
  </div>
  <div class="display-area" id="displayArea">
    <span class="placeholder">？</span>
  </div>
  <div class="btn-row" id="btnRow">
    <button class="btn-start" id="startBtn" onclick="startRoll()">开始选人</button>
  </div>
  <div class="history" id="historyBox" style="display:none">
    <h3>已选中：</h3>
    <div id="historyList"></div>
  </div>
</div>
<script>
  let rafId = null, isRolling = false, names = [], roundCount = 0;
  let lastUpdate = 0;
  const displayArea = document.getElementById('displayArea');
  const btnRow = document.getElementById('btnRow');

  function parseNames() {
    const raw = document.getElementById('names').value.trim();
    return raw.split(/[,，\n\s]+/).map(s => s.trim()).filter(Boolean);
  }

  function getPickCount() {
    return Math.max(1, parseInt(document.getElementById('pickCount').value) || 1);
  }

  function pickRandom(arr, count) {
    const shuffled = [...arr].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, count);
  }

  function rollFrame(timestamp) {
    // 每100ms更新一次文字，避免DOM操作太频繁
    if (timestamp - lastUpdate >= 80) {
      lastUpdate = timestamp;
      const tags = displayArea.querySelectorAll('.name-tag');
      tags.forEach(tag => {
        tag.textContent = names[Math.floor(Math.random() * names.length)];
      });
    }
    if (isRolling) {
      rafId = requestAnimationFrame(rollFrame);
    }
  }

  function startRoll() {
    names = parseNames();
    const count = getPickCount();
    if (names.length < 2) return alert('至少输入2个名字哦');
    if (count > names.length) return alert(`只有 ${names.length} 人，选不了 ${count} 个`);

    isRolling = true;
    // 创建滚动标签
    displayArea.innerHTML = '';
    for (let i = 0; i < count; i++) {
      const tag = document.createElement('span');
      tag.className = 'name-tag rolling';
      tag.textContent = names[Math.floor(Math.random() * names.length)];
      displayArea.appendChild(tag);
    }
    // 切换按钮
    btnRow.innerHTML = '<button class="btn-stop" id="stopBtn" onclick="stopRoll()">停！</button>';

    lastUpdate = 0;
    rafId = requestAnimationFrame(rollFrame);
  }

  function stopRoll() {
    isRolling = false;
    cancelAnimationFrame(rafId);

    const count = getPickCount();
    const chosen = pickRandom(names, count);
    const tags = displayArea.querySelectorAll('.name-tag');

    // 依次弹出
    tags.forEach((tag, i) => {
      setTimeout(() => {
        tag.textContent = chosen[i];
        tag.classList.remove('rolling');
        tag.classList.add('result');
      }, i * 150);
    });

    // 记录历史
    roundCount++;
    const historyBox = document.getElementById('historyBox');
    const historyList = document.getElementById('historyList');
    historyBox.style.display = 'block';
    const roundDiv = document.createElement('div');
    roundDiv.className = 'history-round';
    roundDiv.innerHTML = `
      <div class="round-label">第 ${roundCount} 轮</div>
      <div class="round-names">${chosen.map(n => `<span>${n}</span>`).join('')}</div>
    `;
    historyList.prepend(roundDiv);

    // 恢复按钮
    setTimeout(() => {
      btnRow.innerHTML = '<button class="btn-start" onclick="startRoll()">再来一次</button>';
    }, Math.min(count * 150, 1500));
  }

  // 键盘支持：空格也能停
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && isRolling) {
      e.preventDefault();
      stopRoll();
    }
  });
</script>
</body>
</html>
